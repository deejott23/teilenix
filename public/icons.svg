<?xml version="1.0" encoding="UTF-8"?>
<!--
  sharepa UI Icon Set
  - 24x24 grid
  - stroke 1.75, round caps & joins
  - uses currentColor (steuerbar via CSS color)
  - Verwendung: <svg width="24" height="24"><use href="icons.svg#trip"/></svg>
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <style>
      symbol { color: currentColor; }
    </style>
  </defs>

  <!-- REISE / TRIP (Koffer mit Henkel) -->
  <symbol id="trip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="7" width="18" height="13" rx="2"/>
    <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    <path d="M3 12h18"/>
  </symbol>

  <!-- GRUPPE / GROUP (drei Personen) -->
  <symbol id="group" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="8" r="3"/>
    <path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
    <circle cx="17" cy="6" r="2.5"/>
    <path d="M21 15c-.5-1.7-2.1-3-4-3"/>
  </symbol>

  <!-- AUSGABE / EXPENSE (Geldschein) -->
  <symbol id="expense" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2.5" y="6" width="19" height="12" rx="2"/>
    <circle cx="12" cy="12" r="2.5"/>
    <path d="M5.5 9v.01M18.5 15v.01"/>
  </symbol>

  <!-- HINZUFÜGEN / ADD (Plus) -->
  <symbol id="add" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 8v8M8 12h8"/>
  </symbol>

  <!-- ABRECHNEN / SETTLE (zwei Pfeile gegenläufig - Geld wechselt Richtung) -->
  <symbol id="settle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9h13l-3-3"/>
    <path d="M20 15H7l3 3"/>
  </symbol>

  <!-- SALDO / BALANCE (Waage klar) -->
  <symbol id="balance" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4v16M8 20h8"/>
    <path d="M5 7l7-2 7 2"/>
    <path d="M5 7l-2.5 6h5z"/>
    <path d="M19 7l-2.5 6h5z"/>
  </symbol>

  <!-- BEZAHLT / PAID (Häkchen-Kreis) -->
  <symbol id="paid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M8 12.5l3 3 5-6"/>
  </symbol>

  <!-- OFFEN / PENDING (Uhr) -->
  <symbol id="pending" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 7v5l3 2"/>
  </symbol>

  <!-- KATEGORIEN -->
  <!-- Essen (Teller mit Besteck) -->
  <symbol id="cat-food" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 3v8a3 3 0 0 0 3 3v7"/>
    <path d="M7 7M5 3v4M9 3v4"/>
    <path d="M16 3c-1.5 0-3 1.5-3 4v5h3v9"/>
  </symbol>

  <!-- Hotel (Bett) -->
  <symbol id="cat-hotel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18V8M21 18v-5a3 3 0 0 0-3-3H10v6"/>
    <path d="M3 14h18"/>
    <path d="M3 18h18"/>
    <circle cx="7" cy="12" r="2"/>
  </symbol>

  <!-- Transport (Auto, simpel) -->
  <symbol id="cat-transport" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 17V11l2-5h10l2 5v6"/>
    <path d="M3 17h18"/>
    <circle cx="7.5" cy="17" r="1.5"/>
    <circle cx="16.5" cy="17" r="1.5"/>
    <path d="M5 11h14"/>
  </symbol>

  <!-- Aktivität (Stern) -->
  <symbol id="cat-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.4 6.8 19.1l1-5.8L3.5 9.2l5.9-.9z"/>
  </symbol>

  <!-- Einkauf (Tasche) -->
  <symbol id="cat-shopping" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 8h14l-1 12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2z"/>
    <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
  </symbol>

  <!-- Sonstiges (drei Punkte) -->
  <symbol id="cat-other" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <circle cx="6" cy="12" r="1.6"/>
    <circle cx="12" cy="12" r="1.6"/>
    <circle cx="18" cy="12" r="1.6"/>
  </symbol>

  <!-- TEILEN / SHARE -->
  <symbol id="share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="12" r="2.5"/>
    <circle cx="18" cy="6" r="2.5"/>
    <circle cx="18" cy="18" r="2.5"/>
    <path d="M8 11l8-4M8 13l8 4"/>
  </symbol>

  <!-- EINSTELLUNGEN / SETTINGS -->
  <symbol id="settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
  </symbol>

  <!-- BENUTZER / USER -->
  <symbol id="user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
  </symbol>

  <!-- KALENDER / CALENDAR -->
  <symbol id="calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="16" rx="2"/>
    <path d="M3 10h18M8 3v4M16 3v4"/>
  </symbol>

  <!-- LOCATION / PIN -->
  <symbol id="location" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 22s7-7 7-13a7 7 0 0 0-14 0c0 6 7 13 7 13z"/>
    <circle cx="12" cy="9" r="2.5"/>
  </symbol>

  <!-- PFEIL ZURÜCK -->
  <symbol id="back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 12H5"/>
    <path d="M12 19l-7-7 7-7"/>
  </symbol>

  <!-- CHEVRON RIGHT (für Listen) -->
  <symbol id="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 6l6 6-6 6"/>
  </symbol>

  <!-- BEARBEITEN / EDIT -->
  <symbol id="edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20h9"/>
    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>
  </symbol>

  <!-- LÖSCHEN / DELETE -->
  <symbol id="delete" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 6h18"/>
    <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/>
  </symbol>

  <!-- BENACHRICHTIGUNG / BELL -->
  <symbol id="bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
    <path d="M10 21a2 2 0 0 0 4 0"/>
  </symbol>

</svg>
