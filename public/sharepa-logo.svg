<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="share|pa Logo">
  <title>share|pa</title>
  <desc>share|pa - Fair teilen. Entspannt reisen.</desc>
  <defs>
    <linearGradient id="gBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E6FD9"/>
      <stop offset="100%" stop-color="#2AA8C9"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3DB36A"/>
      <stop offset="100%" stop-color="#2AA8C9"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E94E1B"/>
      <stop offset="100%" stop-color="#F39200"/>
    </linearGradient>
  </defs>

  <!-- Knot-Symbol -->
  <g transform="translate(300,140)" fill="none" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <g transform="rotate(150)">
      <path d="M 0,-35 C -55,-35 -75,25 -35,55 C -10,72 25,55 25,25 C 25,5 10,-10 -8,-8" stroke="url(#gBlue)"/>
    </g>
    <g transform="rotate(-90)">
      <path d="M 0,-35 C -55,-35 -75,25 -35,55 C -10,72 25,55 25,25 C 25,5 10,-10 -8,-8" stroke="url(#gGreen)"/>
    </g>
    <g transform="rotate(30)">
      <path d="M 0,-35 C -55,-35 -75,25 -35,55 C -10,72 25,55 25,25 C 25,5 10,-10 -8,-8" stroke="url(#gOrange)"/>
    </g>
  </g>

  <!-- Schriftzug: rechts/links/center mit drei Ankern, damit Pipe genau in der Mitte sitzt -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" letter-spacing="-1">
    <text x="294" y="290" text-anchor="end"   font-weight="700" fill="#1E6FD9">share</text>
    <text x="300" y="290" text-anchor="middle" font-weight="400" fill="#E94E1B">|</text>
    <text x="306" y="290" text-anchor="start" font-weight="700" fill="#9AA0A6">pa</text>
  </g>

  <text x="300" y="325" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" fill="#5F6368" text-anchor="middle" letter-spacing="0.6">
    Fair teilen. Entspannt reisen.
  </text>
</svg>
